<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <div class="container">
            <article class="content">
                <img src="Profile.jpg" alt="profile pic" id="profile">
                <h1 id="name">Jessica Randall</h1>
                <p id="address">London, United Kingdom</p>
                <p id="quote">"Front-end developer and avid reader."</p>
            <div class="social-links">
                <ul>
                    <li><a href="#" class="links" >GitHub</a></li>
                    <li><a href="#" class="links" >Frontend Mentor</a></li>
                    <li><a href="#" class="links" >LinkedIn</a></li>
                    <li><a href="#" class="links" >Twitter</a></li>
                    <li><a href="#" class="links" >Instagram</a></li>
                </ul>
            </div>
            </article>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
